  <line x1="200" y1="0" x2="200" y2="450" stroke="rgba(255,107,0,0.04)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="rgba(255,107,0,0.04)" stroke-width="1"/>

