  <circle cx="140" cy="415" r="16" fill="rgba(255,107,0,0.8)"/>
  <text x="135" y="419" font-family="monospace" font-size="8" fill="#0d0500" font-weight="bold">TER</text>
  <circle cx="200" cy="415" r="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,107,0,0.2)" stroke-width="1"/>
  <text x="195" y="419" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.3)">QUA</text>
  <circle cx="260" cy="415" r="16" fill="rgba(255,107,0,0.8)"/>
  <text x="255" y="419" font-family="monospace" font-size="8" fill="#0d0500" font-weight="bold">QUI</text>
  <circle cx="320" cy="415" r="16" fill="rgba(255,107,0,0.8)"/>
  <text x="315" y="419" font-family="monospace" font-size="8" fill="#0d0500" font-weight="bold">SEX</text>
  <circle cx="380" cy="415" r="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,107,0,0.2)" stroke-width="1"/>
