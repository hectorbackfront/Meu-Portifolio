  <circle cx="440" cy="415" r="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,107,0,0.2)" stroke-width="1"/>
  <text x="435" y="419" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.3)">DOM</text>

