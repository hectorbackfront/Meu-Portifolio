  <text x="496" y="272" font-family="monospace" font-size="7" fill="rgba(232,66,10,0.6)" letter-spacing="1">HORÁRIO</text>
  <text x="496" y="290" font-family="Arial" font-size="11" font-weight="bold" fill="#F5EDD8">Ter–Dom</text>
  <text x="496" y="308" font-family="monospace" font-size="9" fill="rgba(212,160,23,0.8)">18h – 23h</text>

  <rect x="634" y="252" width="148" height="70" rx="8" fill="rgba(212,160,23,0.06)" stroke="rgba(212,160,23,0.15)" stroke-width="1"/>
  <text x="650" y="272" font-family="monospace" font-size="7" fill="rgba(212,160,23,0.6)" letter-spacing="1">LOCALIZAÇÃO</text>
  <text x="650" y="290" font-family="Arial" font-size="11" font-weight="bold" fill="#F5EDD8">Piracaia</text>
  <text x="650" y="308" font-family="monospace" font-size="9" fill="rgba(245,237,216,0.5)">São Paulo — SP</text>

