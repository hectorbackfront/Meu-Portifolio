<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1209"/>
      <stop offset="100%" style="stop-color:#0d0800"/>
    </linearGradient>
    <linearGradient id="fire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#C93A08"/>
      <stop offset="50%" style="stop-color:#E8420A"/>
      <stop offset="100%" style="stop-color:#D4A017"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E8420A;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#E8420A;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bbg)"/>

  <!-- Ambient glow left -->
  <ellipse cx="200" cy="225" rx="160" ry="160" fill="rgba(232,66,10,0.06)"/>
  <!-- Ambient glow right -->
  <ellipse cx="600" cy="225" rx="120" ry="120" fill="rgba(212,160,23,0.05)"/>

  <!-- Nav bar -->
  <rect width="800" height="52" fill="rgba(10,7,4,0.98)"/>
