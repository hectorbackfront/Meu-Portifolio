  <rect x="510" y="115" width="85" height="8" rx="4" fill="rgba(212,160,23,0.7)"/>
  <rect x="515" y="126" width="75" height="6" rx="3" fill="rgba(139,105,57,0.8)"/>
  <rect x="510" y="135" width="85" height="5" rx="2" fill="rgba(180,80,30,0.9)"/>
  <rect x="515" y="143" width="75" height="5" rx="2" fill="rgba(60,100,30,0.7)"/>
  <rect x="510" y="151" width="85" height="8" rx="4" fill="rgba(212,160,23,0.7)"/>
