  <path d="M 415 430 Q 400 385 412 360 Q 420 335 408 308 Q 428 330 425 358 Q 432 335 440 318 Q 445 348 435 372 Q 448 355 452 375 Q 438 408 415 430Z" fill="url(#fire)" opacity="0.45"/>

