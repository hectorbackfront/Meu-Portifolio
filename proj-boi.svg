  <text x="655" y="215" font-family="Arial" font-size="8" fill="rgba(245,237,216,0.4)">2x blend 150g · bacon</text>
  <rect x="700" y="222" width="52" height="4" rx="2" fill="rgba(232,66,10,0.6)"/>

