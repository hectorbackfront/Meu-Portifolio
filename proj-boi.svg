  <text x="497" y="195" font-family="monospace" font-size="9" fill="rgba(212,160,23,0.9)">R$ 32,00</text>
  <text x="497" y="210" font-family="Arial" font-size="8" fill="rgba(245,237,216,0.4)">Blend 150g · queijo · molho</text>
  <rect x="551" y="218" width="52" height="4" rx="2" fill="rgba(232,66,10,0.6)"/>

  <!-- Burger card 2 -->
  <rect x="638" y="100" width="145" height="130" rx="10" fill="rgba(44,31,14,0.8)" stroke="rgba(232,66,10,0.2)" stroke-width="1"/>
  <rect x="668" y="115" width="85" height="8" rx="4" fill="rgba(212,160,23,0.7)"/>
  <rect x="673" y="126" width="75" height="6" rx="3" fill="rgba(139,105,57,0.8)"/>
  <rect x="668" y="135" width="85" height="5" rx="2" fill="rgba(180,80,30,0.9)"/>
  <rect x="668" y="143" width="85" height="5" rx="2" fill="rgba(180,80,30,0.9)"/>
  <rect x="673" y="151" width="75" height="5" rx="2" fill="rgba(60,100,30,0.7)"/>
  <rect x="668" y="159" width="85" height="8" rx="4" fill="rgba(212,160,23,0.7)"/>
  <text x="655" y="183" font-family="serif" font-size="13" font-weight="bold" fill="#F5EDD8">Double Brasa</text>
