  <!-- Logo text -->
  <text x="36" y="22" font-family="serif" font-size="11" font-style="italic" fill="rgba(212,160,23,0.9)">BOI NA BRASA</text>
  <text x="36" y="38" font-family="monospace" font-size="7" letter-spacing="3" fill="rgba(232,66,10,0.7)">BURGUER</text>
