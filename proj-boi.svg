  <text x="36" y="432" font-family="monospace" font-size="8" fill="rgba(245,237,216,0.25)">boinabrasaburguer.com.br</text>
  <text x="560" y="432" font-family="monospace" font-size="8" fill="rgba(245,237,216,0.25)">© 2026 Boi na Brasa Burguer · Piracaia SP</text>
