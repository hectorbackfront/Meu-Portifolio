  <text x="46" y="165" font-family="serif" font-size="42" font-weight="bold" font-style="italic" fill="#F5EDD8">Boi na</text>
  <text x="46" y="210" font-family="serif" font-size="42" font-weight="bold" font-style="italic" fill="url(#fire)">Brasa</text>

  <text x="46" y="240" font-family="monospace" font-size="10" letter-spacing="1" fill="rgba(245,237,216,0.5)">O melhor smash burger de Piracaia</text>

