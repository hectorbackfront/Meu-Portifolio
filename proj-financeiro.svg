  <rect x="151" y="285" width="22" height="75" rx="3" fill="url(#bar2)"/>
  <rect x="207" y="295" width="22" height="65" rx="3" fill="url(#bar2)"/>
  <rect x="263" y="275" width="22" height="85" rx="3" fill="url(#bar2)"/>
  <rect x="319" y="260" width="22" height="100" rx="3" fill="url(#bar2)"/>
