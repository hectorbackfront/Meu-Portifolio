  <rect x="126" y="250" width="22" height="110" rx="3" fill="url(#bar1)"/>
  <rect x="182" y="230" width="22" height="130" rx="3" fill="url(#bar1)"/>
  <rect x="238" y="240" width="22" height="120" rx="3" fill="url(#bar1)"/>
  <rect x="294" y="220" width="22" height="140" rx="3" fill="url(#bar1)"/>
  <rect x="350" y="200" width="22" height="160" rx="3" fill="url(#bar1)"/>
  <rect x="406" y="215" width="22" height="145" rx="3" fill="url(#bar1)"/>

