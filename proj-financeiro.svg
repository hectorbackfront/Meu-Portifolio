  <rect x="542" y="194" width="212" height="34" rx="6" fill="rgba(0,255,159,0.06)"/>
  <circle cx="560" cy="211" r="10" fill="rgba(0,255,159,0.15)"/>
  <text x="556" y="215" font-family="monospace" font-size="10" fill="#00ff9f">$</text>
  <text x="576" y="207" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.8)">Salário</text>
  <text x="576" y="220" font-family="monospace" font-size="8" fill="rgba(0,212,255,0.4)">01 Jun 2026</text>
  <text x="702" y="214" font-family="monospace" font-size="10" fill="#00ff9f">+7.500</text>

  <rect x="542" y="234" width="212" height="34" rx="6" fill="rgba(255,45,120,0.05)"/>
