  <text x="186" y="375" font-family="monospace" font-size="8" fill="rgba(0,212,255,0.4)">Mar</text>
  <text x="242" y="375" font-family="monospace" font-size="8" fill="rgba(0,212,255,0.4)">Abr</text>
  <text x="298" y="375" font-family="monospace" font-size="8" fill="rgba(0,212,255,0.4)">Mai</text>
  <text x="354" y="375" font-family="monospace" font-size="8" fill="rgba(0,212,255,0.4)">Jun</text>
  <text x="410" y="375" font-family="monospace" font-size="8" fill="rgba(0,212,255,0.4)">Jul</text>

