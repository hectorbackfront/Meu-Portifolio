  <rect x="30" y="162" width="480" height="240" rx="10" fill="rgba(0,212,255,0.04)" stroke="rgba(0,212,255,0.12)" stroke-width="1"/>
  <text x="46" y="184" font-family="monospace" font-size="9" fill="rgba(0,212,255,0.5)" letter-spacing="1">FLUXO DE CAIXA — 2026</text>

  <!-- Chart grid -->
  <line x1="60" y1="360" x2="490" y2="360" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <line x1="60" y1="320" x2="490" y2="320" stroke="rgba(0,212,255,0.07)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="280" x2="490" y2="280" stroke="rgba(0,212,255,0.07)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="240" x2="490" y2="240" stroke="rgba(0,212,255,0.07)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="200" x2="490" y2="200" stroke="rgba(0,212,255,0.07)" stroke-width="1" stroke-dasharray="4,4"/>

