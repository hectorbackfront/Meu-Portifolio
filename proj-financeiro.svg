  <rect x="530" y="162" width="240" height="240" rx="10" fill="rgba(0,212,255,0.04)" stroke="rgba(0,212,255,0.12)" stroke-width="1"/>
  <text x="546" y="184" font-family="monospace" font-size="9" fill="rgba(0,212,255,0.5)" letter-spacing="1">ÚLTIMAS TRANSAÇÕES</text>

