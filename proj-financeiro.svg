  <text x="555" y="255" font-family="monospace" font-size="10" fill="#ff2d78">↓</text>
  <text x="576" y="247" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.8)">Aluguel</text>
  <text x="576" y="260" font-family="monospace" font-size="8" fill="rgba(0,212,255,0.4)">05 Jun 2026</text>
  <text x="700" y="254" font-family="monospace" font-size="10" fill="#ff2d78">-1.800</text>

  <rect x="542" y="274" width="212" height="34" rx="6" fill="rgba(255,45,120,0.05)"/>
  <circle cx="560" cy="291" r="10" fill="rgba(255,45,120,0.15)"/>
  <text x="555" y="295" font-family="monospace" font-size="10" fill="#ff2d78">↓</text>
  <text x="576" y="287" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.8)">Mercado</text>
  <text x="576" y="300" font-family="monospace" font-size="8" fill="rgba(0,212,255,0.4)">08 Jun 2026</text>
  <text x="704" y="294" font-family="monospace" font-size="10" fill="#ff2d78">-420</text>

  <rect x="542" y="314" width="212" height="34" rx="6" fill="rgba(0,212,255,0.05)"/>
  <circle cx="560" cy="331" r="10" fill="rgba(0,212,255,0.15)"/>
  <text x="555" y="335" font-family="monospace" font-size="10" fill="#00d4ff">F</text>
  <text x="576" y="327" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.8)">Freelance</text>
  <text x="576" y="340" font-family="monospace" font-size="8" fill="rgba(0,212,255,0.4)">10 Jun 2026</text>
  <text x="700" y="334" font-family="monospace" font-size="10" fill="#00d4ff">+1.200</text>

  <rect x="542" y="354" width="212" height="34" rx="6" fill="rgba(183,0,255,0.05)"/>
  <circle cx="560" cy="371" r="10" fill="rgba(183,0,255,0.15)"/>
  <text x="555" y="375" font-family="monospace" font-size="10" fill="#b700ff">P</text>
  <text x="576" y="367" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.8)">Poupança</text>
  <text x="576" y="380" font-family="monospace" font-size="8" fill="rgba(0,212,255,0.4)">12 Jun 2026</text>
  <text x="700" y="374" font-family="monospace" font-size="10" fill="#b700ff">+800</text>

  <!-- Bottom glow effect -->
  <ellipse cx="400" cy="450" rx="300" ry="40" fill="rgba(0,255,159,0.04)"/>
