<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020d1f"/>
      <stop offset="100%" style="stop-color:#001a0f"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff9f;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#00b86e;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="rgba(0,212,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="250" x2="800" y2="250" stroke="rgba(0,212,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="350" x2="800" y2="350" stroke="rgba(0,212,255,0.05)" stroke-width="1"/>

  <!-- Top nav bar -->
  <rect width="800" height="44" fill="rgba(0,20,40,0.9)"/>
  <rect width="800" height="1" y="44" fill="rgba(0,212,255,0.15)"/>
  <circle cx="24" cy="22" r="8" fill="rgba(0,255,159,0.2)" stroke="rgba(0,255,159,0.4)" stroke-width="1"/>
  <text x="40" y="27" font-family="monospace" font-size="11" fill="rgba(0,255,159,0.8)">Controle Financeiro</text>
  <rect x="680" y="12" width="60" height="20" rx="4" fill="rgba(0,255,159,0.1)" stroke="rgba(0,255,159,0.3)" stroke-width="1"/>
  <text x="695" y="26" font-family="monospace" font-size="9" fill="rgba(0,255,159,0.8)">+ Nova</text>

  <!-- Stat cards row -->
  <!-- Card Saldo -->
  <rect x="30" y="62" width="170" height="80" rx="10" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>
  <text x="46" y="82" font-family="monospace" font-size="8" fill="rgba(0,212,255,0.5)" letter-spacing="1">SALDO TOTAL</text>
  <text x="46" y="108" font-family="Arial" font-weight="bold" font-size="20" fill="#00ff9f" filter="url(#glow)">R$ 4.280</text>
  <text x="46" y="128" font-family="monospace" font-size="8" fill="rgba(0,255,159,0.6)">↑ +12% esse mês</text>

  <!-- Card Receitas -->
  <rect x="215" y="62" width="170" height="80" rx="10" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>
  <text x="231" y="82" font-family="monospace" font-size="8" fill="rgba(0,212,255,0.5)" letter-spacing="1">RECEITAS</text>
  <text x="231" y="108" font-family="Arial" font-weight="bold" font-size="20" fill="#00d4ff">R$ 7.500</text>
  <text x="231" y="128" font-family="monospace" font-size="8" fill="rgba(0,212,255,0.6)">↑ +8% esse mês</text>

  <!-- Card Despesas -->
  <rect x="400" y="62" width="170" height="80" rx="10" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>
  <text x="416" y="82" font-family="monospace" font-size="8" fill="rgba(0,212,255,0.5)" letter-spacing="1">DESPESAS</text>
  <text x="416" y="108" font-family="Arial" font-weight="bold" font-size="20" fill="#ff2d78">R$ 3.220</text>
  <text x="416" y="128" font-family="monospace" font-size="8" fill="rgba(255,45,120,0.6)">↓ -3% esse mês</text>

  <!-- Card Economias -->
  <rect x="585" y="62" width="175" height="80" rx="10" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>
  <text x="601" y="82" font-family="monospace" font-size="8" fill="rgba(0,212,255,0.5)" letter-spacing="1">ECONOMIAS</text>
  <text x="601" y="108" font-family="Arial" font-weight="bold" font-size="20" fill="#b700ff">R$ 1.060</text>
  <text x="601" y="128" font-family="monospace" font-size="8" fill="rgba(183,0,255,0.6)">↑ +22% esse mês</text>

